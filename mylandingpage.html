        .menu{

        }
        .menu h3{
         font-size: 36px;
         color: #f5f5f5;
         margin-bottom: 20px;
        }
        .menu ul{
         list-style: none;
         padding: 0;
        }

         margin-bottom: 10px;
        }
        .contact{
         background-color: #8b4513;
        }
        .contact h3{
         font-size: 36px;
         color: #ffebcd;
         margin-bottom: 20px;
        }


        @keyframes fadeln{
            from {opacity: 0; transform: translateY (30px);}
            to{opacity: 1; transform: translateY(0);}
        }
